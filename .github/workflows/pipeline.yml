name: Market Sentinel Pipeline

on:
  push:
    branches:
      - main

jobs:
  environment-check:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Project Structure
        run: |
          python -c "import fastapi, pandas, numpy, sklearn, xgboost; print('Dependencies installed successfully')"

      - name: Pipeline Success
        run: echo "Market Sentinel CI passed"