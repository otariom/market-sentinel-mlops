name: Market Sentinel Pipeline

on:
  push:
    branches:
      - main

jobs:
  drift-and-train:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------
      # Step 1: Checkout Repository
      # -----------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v3

      # -----------------------------------
      # Step 2: Setup Python
      # -----------------------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # -----------------------------------
      # Step 3: Install Dependencies
      # -----------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------
      # Step 4: Run Data Ingestion
      # -----------------------------------
      - name: Run Data Ingestion
        run: |
          python src/data_ingestion.py

      # -----------------------------------
      # Step 5: Run Drift Detection
      # -----------------------------------
      - name: Run Drift Detection
        id: drift_check
        run: |
          python src/drift_detection.py
        continue-on-error: true

      # -----------------------------------
      # Step 6: Train Model If Drift Detected
      # -----------------------------------
      - name: Train Model If Drift Detected
        if: steps.drift_check.outcome == 'failure'
        run: |
          python src/model_train.py

      # -----------------------------------
      # Step 7: Pipeline Complete
      # -----------------------------------
      - name: Pipeline Finished
        run: echo "Pipeline executed successfully"